<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fractions Conversion Assignment</title>
    <style>
        body {
            font-family: 'Comic Sans MS', cursive, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .gatekeeper-container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            max-width: 500px;
            width: 100%;
            text-align: center;
            box-sizing: border-box;
        }

        .gatekeeper-container h2 {
            color: #4c1d95;
            margin-bottom: 20px;
        }

        .gatekeeper-container input[type="text"] {
            padding: 12px 20px;
            font-size: 1.2rem;
            border-radius: 10px;
            border: 3px solid #cbd5e0;
            width: 80%;
            margin-bottom: 20px;
            text-align: center;
            font-family: 'Comic Sans MS', sans-serif;
            outline: none;
        }

        .start-btn {
            background: #48bb78;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 12px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
        }

        .start-btn:disabled {
            background: #a0aec0;
            cursor: not-allowed;
            opacity: 0.6;
        }

        .game-container {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            max-width: 900px;
            width: 100%;
            text-align: center;
            box-sizing: border-box;
        }

        h1 {
            color: #4a5568;
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        .student-badge {
            background: #f3e8ff;
            color: #6b21a8;
            padding: 8px 15px;
            border-radius: 20px;
            font-weight: bold;
            display: inline-block;
            margin-bottom: 15px;
            border: 1px solid #d8b4fe;
        }

        .score-board {
            display: flex;
            justify-content: space-between;
            margin-bottom: 30px;
            padding: 15px;
            background: #f7fafc;
            border-radius: 15px;
            font-size: 1.2rem;
            font-weight: bold;
        }

        .score { color: #38a169; }
        .progress-tracker { color: #2b6cb0; }

        .question-area {
            margin-bottom: 30px;
            padding: 20px;
            background: #edf2f7;
            border-radius: 15px;
        }

        .question {
            font-size: 1.5rem;
            color: #2d3748;
            margin-bottom: 20px;
        }

        .fractions-display {
            display: flex;
            justify-content: center;
            align-items: flex-start;
            gap: 20px;
            margin: 30px 0;
            flex-wrap: wrap;
        }

        .fraction-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            min-width: 260px;
        }

        .fraction-label {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: white;
            padding: 20px;
            border-radius: 15px;
            border: 2px solid #cbd5e0;
            width: 100%;
            box-sizing: border-box;
            font-size: 2.2rem;
            font-weight: bold;
        }

        .num-denom-display {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-width: 60px;
        }

        .frac-line {
            width: 100%;
            height: 4px;
            background-color: #2d3748;
            margin: 6px 0;
        }

        .book-working-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 2px dashed #e2e8f0;
            font-size: 1.5rem;
        }

        .arrow-indicator {
            color: #a855f7;
            font-size: 1.8rem;
        }

        .working-stack {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: #fbf7ff;
            border: 2px solid #d8b4fe;
            padding: 10px;
            border-radius: 10px;
            min-width: 90px;
        }

        .working-stack input[type="number"] {
            width: 60px;
            padding: 4px;
            font-size: 1.1rem;
            border-radius: 5px;
            border: 2px solid #c084fc;
            text-align: center;
            font-weight: bold;
            font-family: 'Comic Sans MS', sans-serif;
        }

        .working-text-node {
            font-size: 1.4rem;
            color: #4c1d95;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .center-lcd-box {
            background: #fef08a;
            border: 2px dashed #ca8a04;
            padding: 15px;
            border-radius: 12px;
            margin: 15px auto;
            max-width: 400px;
            font-weight: bold;
        }

        .center-lcd-box input {
            width: 80px;
            padding: 6px;
            font-size: 1.2rem;
            text-align: center;
            border-radius: 6px;
            border: 2px solid #eab308;
            font-weight: bold;
        }

        .inline-check-btn {
            background: #a855f7;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.95rem;
            font-weight: bold;
            margin-left: 6px;
        }

        .answer-buttons {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .answer-btn {
            padding: 15px 30px;
            font-size: 1.3rem;
            font-weight: bold;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            min-width: 120px;
        }

        .btn-option-a { background: #4299e1; color: white; }
        .btn-option-b { background: #48bb78; color: white; }
        .btn-equal { background: #ed8936; color: white; }

        .help-btn {
            background: #a855f7;
            color: white;
            border: 2px solid #9333ea;
            padding: 12px 24px;
            border-radius: 10px;
            font-size: 1.1rem;
            cursor: pointer;
            margin: 10px 5px;
            font-weight: bold;
        }

        .workspace-feedback {
            margin: 15px auto;
            font-weight: bold;
            color: #e53e3e;
            font-size: 1.1rem;
        }
        .workspace-feedback.success { color: #2f855a; }

        .feedback {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            font-size: 1.2rem;
            font-weight: bold;
            min-height: 50px;
        }
        .correct { background: #c6f6d5; color: #22543d; }
        .incorrect { background: #fed7d7; color: #742a2a; }

        .new-game-btn {
            background: #805ad5;
            color: white;
            padding: 15px 30px;
            font-size: 1.2rem;
            font-weight: bold;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            margin-top: 20px;
        }

        .early-submit-container {
            margin-top: 35px;
            border-top: 2px dashed #cbd5e0;
            padding-top: 20px;
        }

        .early-btn {
            background: #e53e3e;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
        }

        .final-sync-btn {
            background: #2f855a;
            color: white;
            padding: 20px 40px;
            font-size: 1.6rem;
            font-weight: bold;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            margin-top: 25px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.03); }
            100% { transform: scale(1); }
        }

        .hidden-element { display: none !important; }
    </style>
</head>
<body>

    <div class="gatekeeper-container" id="gatekeeperScreen">
        <h2>Welcome to the Fractions Assignment!</h2>
        <p>Please enter your first and last name to begin:</p>
        <input type="text" id="studentNameInput" placeholder="Your Name..." oninput="checkNameInput()">
        <br>
        <button id="startAssignmentBtn" class="start-btn" onclick="letTheGameBegin()" disabled>Start Assignment ➔</button>
    </div>

    <div class="game-container hidden-element" id="mainContainer">
        <h1>🥧 Fractions Assignment 🥧</h1>
        <div class="student-badge" id="activeStudentBadge">👤 Student: </div>
        
        <div class="score-board">
            <div class="score">Points: <span id="score">0</span></div>
            <div class="progress-tracker">Question: <span id="currentQuestionNum">1</span> of <span id="totalQuestionsNum">5</span></div>
        </div>

        <div class="question-area" id="activePlayArea">
            <div class="question">Which fraction is larger?</div>
            
            <div id="centerLcdBox" class="center-lcd-box hidden-element">
                <span>Find the Lowest Common Denominator (LCD):</span><br><br>
                <input type="number" id="userCommonDenom" placeholder="??">
                <button class="inline-check-btn" onclick="validateCommonDenominator()">Check LCD</button>
            </div>
            <div id="workspaceFeedback" class="workspace-feedback"></div>

            <div class="fractions-display">
                <div class="fraction-item">
                    <div class="fraction-label">
                        <div style="display: flex; align-items: center; gap: 15px;">
                            <div class="num-denom-display">
                                <span id="f1-num">1</span>
                                <div class="frac-line"></div>
                                <span id="f1-den">2</span>
                            </div>
                            <div id="bookWorkingContainer1"></div>
                        </div>
                    </div>
                </div>
                
                <div class="fraction-item">
                    <div class="fraction-label">
                        <div style="display: flex; align-items: center; gap: 15px;">
                            <div class="num-denom-display">
                                <span id="f2-num">1</span>
                                <div class="frac-line"></div>
                                <span id="f2-den">3</span>
                            </div>
                            <div id="bookWorkingContainer2"></div>
                        </div>
                    </div>
                </div>
            </div>

            <div id="actionButtonsContainer">
                <button id="convertBtn" class="help-btn" onclick="startConversionWorkspace()">⚙️ Convert to the same denominator</button>
            </div>

            <div class="answer-buttons">
                <button class="answer-btn btn-option-a" onclick="checkAnswer('A')">Left Fraction</button>
                <button class="answer-btn btn-equal" onclick="checkAnswer('Equal')">Equal</button>
                <button class="answer-btn btn-option-b" onclick="checkAnswer('B')">Right Fraction</button>
            </div>

            <div class="feedback" id="feedback"></div>
            <button class="new-game-btn hidden-element" id="nextQuestionBtn" onclick="newQuestion()">Next Question ➔</button>
        </div>

        <div class="early-submit-container" id="earlySubmitArea">
            <button class="early-btn" onclick="submitAssignmentEarly()">📤 Turn In Assignment Early</button>
        </div>
    </div>

    <script>
        // --- GOOGLE FORM REDIRECT CONFIGURATION ---
        const TOTAL_QUESTIONS = 5; 
        const BASE_FORM_URL = "https://docs.google.com/forms/d/e/1FAIpQLScvx6TtF2ZweIF8hEgkPnk7eXz-5JcnHY6MgD875_twmJ13lw/viewform";
        
        const NAME_ID    = "entry.1276936595"; 
        const PROBLEM_ID = "entry.1193311180"; 
        const OUTCOME_ID = "entry.746519509"; 
        const MISTAKE_ID = "entry.1716961822"; 

        let score = 0, currentQuestionIndex = 1, currentAnswer = '';
        let fraction1, fraction2;
        let usedConversion = false;
        let selectedDenominator = 0;
        let finalStudentName = "";

        // Performance compilation variables
        let problemHistory = [];
        let outcomeHistory = [];
        let mistakeHistory = [];

        document.getElementById('totalQuestionsNum').textContent = TOTAL_QUESTIONS;

        function checkNameInput() {
            const inputVal = document.getElementById('studentNameInput').value.trim();
            document.getElementById('startAssignmentBtn').disabled = inputVal.length < 3;
        }

        function letTheGameBegin() {
            finalStudentName = document.getElementById('studentNameInput').value.trim();
            document.getElementById('activeStudentBadge').textContent = `👤 Student: ${finalStudentName}`;
            document.getElementById('gatekeeperScreen').classList.add('hidden-element');
            document.getElementById('mainContainer').classList.remove('hidden-element');
        }

        function generateFraction() {
            const denominators = [2, 3, 4, 5, 6, 8, 10, 12];
            const denominator = denominators[Math.floor(Math.random() * denominators.length)];
            const numerator = Math.floor(Math.random() * (denominator - 1)) + 1;
            return { numerator, denominator };
        }

        function findLCM(a, b) {
            let min = Math.max(a, b);
            while(true) { if (min % a === 0 && min % b === 0) return min; min++; }
        }

        function startConversionWorkspace() {
            usedConversion = true;
            document.getElementById('convertBtn').style.display = 'none';
            document.getElementById('centerLcdBox').classList.remove('hidden-element');
            document.getElementById('userCommonDenom').value = "";
            document.getElementById('workspaceFeedback').textContent = "";
            document.getElementById('workspaceFeedback').className = "workspace-feedback";
        }

        function validateCommonDenominator() {
            const inputVal = parseInt(document.getElementById('userCommonDenom').value, 10);
            const feedback = document.getElementById('workspaceFeedback');
            const trueLCM = findLCM(fraction1.denominator, fraction2.denominator);

            if (!inputVal || inputVal <= 0) return;

            if (inputVal === trueLCM) {
                selectedDenominator = inputVal;
                feedback.innerHTML = `🎉 Correct LCD! Now compute the numerators.`;
                feedback.className = "workspace-feedback success";

                document.getElementById('bookWorkingContainer1').innerHTML = `
                    <div id="bookWorking1" class="book-working-container">
                        <div class="arrow-indicator">➔</div>
                        <div class="working-stack">
                            <div id="leftTopSlot" class="working-text-node">
                                <input type="number" id="userLeftNum" placeholder="?">
                                <button class="inline-check-btn" onclick="validateLeftNumerator()">Go</button>
                            </div>
                            <div class="frac-line" style="background-color:#a855f7;"></div>
                            <div class="working-text-node" style="color:#7c3aed;">${selectedDenominator}</div>
                        </div>
                    </div>`;

                document.getElementById('bookWorkingContainer2').innerHTML = `
                    <div id="bookWorking2" class="book-working-container">
                        <div class="arrow-indicator">➔</div>
                        <div class="working-stack">
                            <div id="rightTopSlot" class="working-text-node">
                                <input type="number" id="userRightNum" placeholder="?">
                                <button class="inline-check-btn" onclick="validateRightNumerator()">Go</button>
                            </div>
                            <div class="frac-line" style="background-color:#a855f7;"></div>
                            <div class="working-text-node" style="color:#7c3aed;">${selectedDenominator}</div>
                        </div>
                    </div>`;

                document.getElementById('centerLcdBox').classList.add('hidden-element');
            } else {
                feedback.textContent = `❌ That is not the lowest common denominator. Try again!`;
                feedback.className = "workspace-feedback";
                mistakeHistory.push(`Q${currentQuestionIndex} Wrong LCD: ${inputVal}`);
            }
        }

        function validateLeftNumerator() {
            const inputNum = parseInt(document.getElementById('userLeftNum').value, 10);
            const feedback = document.getElementById('workspaceFeedback');
            const targetNum = (selectedDenominator / fraction1.denominator) * fraction1.numerator;

            if (inputNum === targetNum) {
                feedback.textContent = "🎉 Left side updated!";
                feedback.className = "workspace-feedback success";
                document.getElementById('leftTopSlot').innerHTML = `<span style="color:#7c3aed;">${inputNum}</span>`;
            } else {
                feedback.textContent = "❌ Incorrect scaling multiplier.";
                mistakeHistory.push(`Q${currentQuestionIndex} Left Scale Error: ${inputNum}`);
            }
        }

        function validateRightNumerator() {
            const inputNum = parseInt(document.getElementById('userRightNum').value, 10);
            const feedback = document.getElementById('workspaceFeedback');
            const targetNum = (selectedDenominator / fraction2.denominator) * fraction2.numerator;

            if (inputNum === targetNum) {
                feedback.textContent = "🎉 Right side updated! Now pick the larger fraction below.";
                feedback.className = "workspace-feedback success";
                document.getElementById('rightTopSlot').innerHTML = `<span style="color:#7c3aed;">${inputNum}</span>`;
            } else {
                feedback.textContent = "❌ Incorrect scaling multiplier.";
                mistakeHistory.push(`Q${currentQuestionIndex} Right Scale Error: ${inputNum}`);
            }
        }

        function checkAnswer(userAnswer) {
            const feedbackElement = document.getElementById('feedback');
            
            // Build current problem string summary
            problemHistory.push(`#${currentQuestionIndex} (${fraction1.numerator}/${fraction1.denominator} vs ${fraction2.numerator}/${fraction2.denominator})`);

            if (userAnswer === currentAnswer) {
                score += 10;
                feedbackElement.textContent = `🎉 Correct!`;
                feedbackElement.className = 'feedback correct'; 
                outcomeHistory.push(`Q${currentQuestionIndex}: Correct` + (usedConversion ? " (Used LCD)" : ""));
            } else {
                feedbackElement.textContent = `❌ Incorrect choice.`;
                feedbackElement.className = 'feedback incorrect';
                outcomeHistory.push(`Q${currentQuestionIndex}: Incorrect`);
                mistakeHistory.push(`Q${currentQuestionIndex} picked ${userAnswer}`);
            }
            
            document.getElementById('score').textContent = score;

            document.getElementById('convertBtn').style.display = 'none';
            document.getElementById('centerLcdBox').classList.add('hidden-element');

            const commonLCM = findLCM(fraction1.denominator, fraction2.denominator);
            
            document.getElementById('bookWorkingContainer1').innerHTML = `
                <div class="book-working-container">
                    <div class="arrow-indicator">➔</div>
                    <div class="working-stack">
                        <div class="working-text-node"><span style="color:#7c3aed;">${(commonLCM/fraction1.denominator)*fraction1.numerator}</span></div>
                        <div class="frac-line" style="background-color:#a855f7;"></div>
                        <div class="working-text-node" style="color:#7c3aed;">${commonLCM}</div>
                    </div>
                </div>`;

            document.getElementById('bookWorkingContainer2').innerHTML = `
                <div class="book-working-container">
                    <div class="arrow-indicator">➔</div>
                    <div class="working-stack">
                        <div class="working-text-node"><span style="color:#7c3aed;">${(commonLCM/fraction2.denominator)*fraction2.numerator}</span></div>
                        <div class="frac-line" style="background-color:#a855f7;"></div>
                        <div class="working-text-node" style="color:#7c3aed;">${commonLCM}</div>
                    </div>
                </div>`;

            if (currentQuestionIndex < TOTAL_QUESTIONS) {
                document.getElementById('nextQuestionBtn').classList.remove('hidden-element');
            } else {
                finishAssignmentComplete();
            }
        }

        function setupQuestionData(f1, f2) {
            fraction1 = f1; fraction2 = f2;
            document.getElementById('f1-num').textContent = fraction1.numerator;
            document.getElementById('f1-den').textContent = fraction1.denominator;
            document.getElementById('f2-num').textContent = fraction2.numerator;
            document.getElementById('f2-den').textContent = fraction2.denominator;
            currentAnswer = (fraction1.numerator/fraction1.denominator) === (fraction2.numerator/fraction2.denominator) ? 'Equal' : (fraction1.numerator/fraction1.denominator) > (fraction2.numerator/fraction2.denominator) ? 'A' : 'B';
            
            document.getElementById('bookWorkingContainer1').innerHTML = "";
            document.getElementById('bookWorkingContainer2').innerHTML = "";
        }

        function newQuestion() {
            currentQuestionIndex++;
            document.getElementById('currentQuestionNum').textContent = currentQuestionIndex;
            document.getElementById('nextQuestionBtn').classList.add('hidden-element');
            
            usedConversion = false;

            let f1 = generateFraction(); let f2 = generateFraction();
            while (f1.numerator === f2.numerator && f1.denominator === f2.denominator) { f2 = generateFraction(); }
            
            setupQuestionData(f1, f2);
            document.getElementById('centerLcdBox').classList.add('hidden-element');
            document.getElementById('feedback').textContent = '';
            document.getElementById('feedback').className = 'feedback';
            document.getElementById('workspaceFeedback').textContent = '';
            document.getElementById('convertBtn').style.display = 'inline-block';
        }

        function submitAssignmentEarly() {
            if(confirm("Are you sure you want to turn in your work early? Your score will be calculated based on your progress so far.")) {
                outcomeHistory.push("Turned In Early on Q" + currentQuestionIndex);
                finishAssignmentComplete(true);
            }
        }

        function finishAssignmentComplete(wasEarly = false) {
            const playArea = document.getElementById('activePlayArea');
            document.getElementById('earlySubmitArea').classList.add('hidden-element');
            
            // Build the unblockable custom prefilled data parameters strings
            const finalProblems = problemHistory.join(" | ") || "None completed";
            const finalOutcomes = "Score: " + score + " pts | " + outcomeHistory.join(" | ");
            const finalMistakes = mistakeHistory.join(" | ") || "No recorded scaling/LCD mistakes";

            // Generate secure encoded payload URLs mapping perfectly to your parameters
            const prefilledUrl = BASE_FORM_URL + "?" + 
                NAME_ID + "=" + encodeURIComponent(finalStudentName) + "&" +
                PROBLEM_ID + "=" + encodeURIComponent(finalProblems) + "&" +
                OUTCOME_ID + "=" + encodeURIComponent(finalOutcomes) + "&" +
                MISTAKE_ID + "=" + encodeURIComponent(finalMistakes);

            let headerText = wasEarly ? "<h3>Assignment Turned In Early!</h3>" : "<h3>🎉 Assignment Complete!</h3>";
            
            playArea.innerHTML = `
                <div style="padding: 30px; background: #f0fdf4; border-radius: 15px; color: #166534; text-align: center;">
                    ${headerText}
                    <p style="font-size: 1.4rem; font-weight: bold; color: #2d3748;">Your Score: ${score} points.</p>
                    
                    <hr style="border: 1px dashed #cbd5e0; margin: 20px 0;">
                    
                    <p style="font-size: 1.1rem; color: #2b6cb0; font-weight: bold;">
                        ⚠️ ONE FINAL STEP TO SEND THIS TO YOUR TEACHER:
                    </p>
                    <p style="color: #4a5568;">
                        Click the green button below. It will open your school form with your score already filled out. Just click <strong>Submit</strong> on that page!
                    </p>
                    
                    <button class="final-sync-btn" onclick="window.open('${prefilledUrl}', '_blank')">
                        🟢 Click Here to Sync Your Grade
                    </button>
                </div>
            `;
        }

        let initF1 = generateFraction(); let initF2 = generateFraction();
        while (initF1.numerator === initF2.numerator && initF1.denominator === initF2.denominator) { initF2 = generateFraction(); }
        setupQuestionData(initF1, initF2);
    </script>
</body>
</html>
